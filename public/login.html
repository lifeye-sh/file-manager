<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>登录 - 文件管理器</title>
  <style>
    /* === Variables (match main theme) === */
    :root {
      --bg-primary: #1e1e2e;
      --bg-secondary: #181825;
      --bg-tertiary: #11111b;
      --bg-hover: #313244;
      --bg-active: #45475a;
      --text-primary: #cdd6f4;
      --text-secondary: #a6adc8;
      --text-muted: #6c7086;
      --accent: #89b4fa;
      --accent-hover: #74c7ec;
      --border: #313244;
      --danger: #f38ba8;
      --success: #a6e3a1;
      --radius: 8px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* === Background decorative elements === */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse at 30% 20%, rgba(137, 180, 250, 0.06) 0%, transparent 60%),
                  radial-gradient(ellipse at 70% 80%, rgba(245, 194, 231, 0.04) 0%, transparent 60%);
      pointer-events: none;
      z-index: 0;
    }

    /* === Login Card === */
    .login-card {
      position: relative;
      z-index: 1;
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: 16px;
      width: 400px;
      max-width: 92vw;
      padding: 40px 36px;
      box-shadow: 0 16px 48px rgba(0, 0, 0, 0.4);
    }

    .login-card-header {
      text-align: center;
      margin-bottom: 32px;
    }

    .login-card-header .logo {
      font-size: 48px;
      margin-bottom: 8px;
    }

    .login-card-header h1 {
      font-size: 22px;
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: 4px;
    }

    .login-card-header p {
      font-size: 13px;
      color: var(--text-muted);
    }

    /* === Form === */
    .form-group {
      margin-bottom: 20px;
    }

    .form-group label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      color: var(--text-secondary);
      margin-bottom: 6px;
    }

    .form-group input {
      width: 100%;
      background: var(--bg-tertiary);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px 16px;
      color: var(--text-primary);
      font-size: 15px;
      outline: none;
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
    }

    .form-group input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(137, 180, 250, 0.12);
    }

    .form-group input.input-error {
      border-color: var(--danger);
      box-shadow: 0 0 0 3px rgba(243, 139, 168, 0.12);
    }

    .form-group input::placeholder { color: var(--text-muted); }

    /* === Error Message === */
    .form-error {
      display: none;
      background: rgba(243, 139, 168, 0.1);
      border: 1px solid rgba(243, 139, 168, 0.3);
      border-radius: 6px;
      padding: 10px 14px;
      color: var(--danger);
      font-size: 13px;
      margin-bottom: 20px;
      animation: fadeIn 0.2s ease;
    }

    .form-error.show { display: block; }

    /* === Submit Button === */
    .btn-login {
      width: 100%;
      padding: 12px;
      background: var(--accent);
      color: var(--bg-tertiary);
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s ease, transform 0.1s ease;
      margin-top: 4px;
    }

    .btn-login:hover { opacity: 0.85; }
    .btn-login:active { transform: scale(0.98); }
    .btn-login:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }

    /* === Spinner inside button === */
    .btn-spinner {
      display: none;
      width: 18px;
      height: 18px;
      border: 2px solid rgba(17, 17, 27, 0.3);
      border-top-color: var(--bg-tertiary);
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      margin-right: 8px;
      vertical-align: middle;
    }

    .btn-login.loading .btn-spinner { display: inline-block; }
    .btn-login.loading .btn-text { display: none; }

    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

    /* === Footer === */
    .login-card-footer {
      text-align: center;
      margin-top: 24px;
      font-size: 12px;
      color: var(--text-muted);
    }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="login-card-header">
      <div class="logo">&#x1F4C2;</div>
      <h1>文件管理器</h1>
      <p>请输入用户名和密码登录</p>
    </div>

    <div id="error-msg" class="form-error"></div>

    <form id="login-form">
      <div class="form-group">
        <label for="username">用户名</label>
        <input type="text" id="username" placeholder="请输入用户名" autocomplete="username" autofocus>
      </div>

      <div class="form-group">
        <label for="password">密码</label>
        <input type="password" id="password" placeholder="请输入密码" autocomplete="current-password">
      </div>

      <button type="button" id="login-btn" class="btn-login">
        <span class="btn-spinner"></span>
        <span class="btn-text">登 录</span>
      </button>
    </form>

    <div class="login-card-footer">
      安全连接 · 数据加密传输
    </div>
  </div>

  <script>
    (function () {
      const form = document.getElementById('login-form');
      const usernameInput = document.getElementById('username');
      const passwordInput = document.getElementById('password');
      const loginBtn = document.getElementById('login-btn');
      const errorMsg = document.getElementById('error-msg');

      console.log('[login] script loaded');

      let csrfToken = '';

      function showError(msg) {
        errorMsg.textContent = msg;
        errorMsg.classList.add('show');
      }

      function hideError() {
        errorMsg.classList.remove('show');
        errorMsg.textContent = '';
      }

      function setInputError(el) {
        el.classList.add('input-error');
        setTimeout(() => el.classList.remove('input-error'), 2000);
      }

      function setLoading(loading) {
        loginBtn.disabled = loading;
        loginBtn.classList.toggle('loading', loading);
      }

      async function fetchCsrfToken() {
        try {
          const res = await fetch('/api/csrf-token', { method: 'GET', credentials: 'same-origin' });
          if (res.ok) {
            const data = await res.json();
            csrfToken = data.token;
            console.log('[login] csrf token loaded');
          }
        } catch (err) {
          console.error('[login] csrf fetch error', err);
        }
      }

      async function checkSession() {
        try {
          const res = await fetch('/api/auth/session', { method: 'GET', credentials: 'same-origin' });
          if (res.ok) {
            window.location.href = '/';
            return true;
          }
        } catch (_) {}
        return false;
      }

      async function doLogin() {
        hideError();

        const username = usernameInput.value.trim();
        const password = passwordInput.value;

        if (!username) {
          showError('请输入用户名');
          setInputError(usernameInput);
          return;
        }
        if (!password) {
          showError('请输入密码');
          setInputError(passwordInput);
          return;
        }

        setLoading(true);
        console.log('[login] attempting', username);

        try {
          const headers = { 'Content-Type': 'application/json' };
          if (csrfToken) headers['X-CSRF-Token'] = csrfToken;

          const res = await fetch('/api/auth/login', {
            method: 'POST',
            headers: headers,
            credentials: 'same-origin',
            body: JSON.stringify({ username, password }),
          });

          const data = await res.json();
          console.log('[login] response', res.status, data);

          if (!res.ok) {
            showError(data.error || '登录失败');
            setLoading(false);
            return;
          }

          window.location.href = '/';
        } catch (err) {
          console.error('[login] error', err);
          showError('网络错误，请检查连接后重试');
          setLoading(false);
        }
      }

      // Intercept form submit and Enter key; button is type="button" to avoid default submission
      form.addEventListener('submit', (e) => {
        e.preventDefault();
        doLogin();
      });
      loginBtn.addEventListener('click', (e) => {
        e.preventDefault();
        doLogin();
      });
      [usernameInput, passwordInput].forEach((input) => {
        input.addEventListener('keydown', (e) => {
          if (e.key === 'Enter') {
            e.preventDefault();
            doLogin();
          }
        });
      });

      // Initialize
      fetchCsrfToken();
      checkSession();
    })();
  </script>
</body>
</html>
